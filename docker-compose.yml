services:
  cockpit:
    build: .
    container_name: cockpit
    working_dir: /app
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./app:/app
      - ./data:/app/data
      # Optional: mount a distilled-notes vault (see BRAIN_DATA in .env.example)
      # - /path/to/your/brain:/app/data/brain:ro
    environment:
      PORT: 8000
      TZ: ${TZ:-UTC}
      GEMINI_DATA: /app/data/gemini
      CLAUDE_DATA: /app/data/claude
      CLAUDE_CONVERTED: /app/data/claude_converted
      CODEX_DATA: /app/data/codex
      CHATGPT_SITE_DATA: /app/data/chatgpt_site
      BRAIN_DATA: /app/data/brain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      RERANK_MODEL: ${RERANK_MODEL:-gpt-4o-mini}
      RERANK_TOP: ${RERANK_TOP:-30}
      ASK_MODEL: ${ASK_MODEL:-gpt-4o-mini}
      ASK_CHAR_BUDGET: ${ASK_CHAR_BUDGET:-90000}
      ASK_RECENT_DAYS: ${ASK_RECENT_DAYS:-5}
      MEMORY_SKILL: ${MEMORY_SKILL:-}
      PYTHONUNBUFFERED: "1"
    command: python cockpit.py
    restart: unless-stopped
